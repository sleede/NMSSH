version: '3.8'
services:
  ssh-server:
    image: linuxserver/openssh-server
    container_name: nmssh-test-server
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=password
      - USER_NAME=user
      - SUDO_ACCESS=false
      - PUBLIC_KEY_FILE=/config/ssh_host_rsa_key.pub
    ports:
      - "2222:2222"
    volumes:
      - ./test-data:/var/www/nmssh-tests
      - ./ssh-keys:/config/.ssh
      - ./sshd_config:/etc/ssh/sshd_config
    restart: unless-stopped
